<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-[#0b0f14] text-white">
    <header
      class="fixed top-0 left-0 w-full bg-[#0b0f14]/80 backdrop-blur-md border-b border-gray-800 z-50"
    >
      <div
        class="max-w-6xl mx-auto flex justify-between items-center px-6 py-4"
      >
        <h1 class="text-xl font-bold text-green-400">Joe-Wando</h1>

        <nav class="space-x-6 hidden md:block">
          <a href="index.html" class="hover:text-green-400">Accueil</a>
          <a href="competences.html" class="hover:text-green-400"
            >Compétences</a
          >
          <a href="projets.html" class="hover:text-green-400">Projets</a>
          <a href="contact.html" class="text-green-400">Contact</a>
          <a href="formations.html" class="hover:text-green-400">Formations</a>
        </nav>
      </div>
    </header>

    <main class="pt-32 pb-20">
      <section class="container mx-auto px-6">
        <h2 class="text-3xl font-extrabold mb-10">Contact</h2>

        <div class="mb-10 space-y-2 text-slate-400">
          <p>Email : wando@email.com</p>
          <p>LinkedIn : linkedin.com/in/wando</p>
        </div>

        <form class="max-w-xl space-y-4">
          <input
            type="text"
            placeholder="Nom"
            class="w-full p-3 rounded-lg bg-[#0e1318] border border-white/10 text-white focus:outline-none focus:border-[#00d4aa]"
          />

          <input
            type="email"
            placeholder="Email"
            class="w-full p-3 rounded-lg bg-[#0e1318] border border-white/10 text-white focus:outline-none focus:border-[#00d4aa]"
          />

          <textarea
            placeholder="Message"
            class="w-full p-3 rounded-lg bg-[#0e1318] border border-white/10 text-white focus:outline-none focus:border-[#00d4aa]"
          ></textarea>

          <button
            class="px-6 py-3 bg-[#00d4aa] text-black font-bold rounded-lg hover:scale-105 hover:shadow-lg transition duration-300"
          >
            Envoyer
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
