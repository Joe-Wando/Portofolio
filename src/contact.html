<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-[#0b0f14] text-white">
    <header
      class="fixed top-0 left-0 w-full bg-[#0b0f14]/80 backdrop-blur border-b border-white/10"
    >
      <div
        class="container mx-auto px-6 py-4 flex justify-between items-center"
      >
        <h1 class="font-bold text-lg text-[#00d4aa]">Wando</h1>

        <nav class="space-x-6 text-sm text-slate-300">
          <a href="index.html" class="hover:text-white">Accueil</a>
          <a href="formations.html" class="hover:text-white">Formations</a>
          <a href="competences.html" class="hover:text-white">Compétences</a>
          <a href="contact.html" class="text-[#00d4aa]">Contact</a>
        </nav>
      </div>
    </header>

    <main class="pt-32 pb-20">
      <section class="container mx-auto px-6">
        <h2 class="text-3xl font-extrabold mb-10">Contact</h2>

        <div class="mb-10 space-y-2 text-slate-400">
          <p>Email : wando@email.com</p>
          <p>LinkedIn : linkedin.com/in/wando</p>
        </div>

        <form class="max-w-xl">
          <input
            type="text"
            placeholder="Nom"
            class="w-full mb-4 p-3 rounded-lg bg-[#0e1318] border border-white/10 text-white"
          />

          <input
            type="email"
            placeholder="Email"
            class="w-full mb-4 p-3 rounded-lg bg-[#0e1318] border border-white/10 text-white"
          />

          <textarea
            placeholder="Message"
            class="w-full mb-4 p-3 rounded-lg bg-[#0e1318] border border-white/10 text-white"
          ></textarea>

          <button
            class="px-6 py-3 bg-[#00d4aa] text-black font-bold rounded-lg"
          >
            Envoyer
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
